name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, format, pipelines, tests
    runs-on: ubuntu-latest
    steps:
      # Vendored SDK lives in a submodule; CI does not need it (it is excluded
      # from lint/test), so we skip fetching submodules for speed.
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Run the exact same hooks developers run locally: ruff lint + format,
      # file hygiene, shellcheck (build scripts), actionlint (this pipeline).
      - name: Pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

      # The pre-push hook stage holds the tests; run it explicitly in CI.
      - name: Tests
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
